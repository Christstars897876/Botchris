<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Hugging Face</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>IA Texte Générateur</h1>
        
        <label Pour="prompt">Votre consigne (Prompt) :</label>
        <textarea id="prompt" placeholder="Écris un poème sur la technologie..."></textarea>

        <div class="options">
            <div class="option-group">
                <label for="temperature">Créativité (Temperature) : <span id="temp-val">0.7</span></label>
                <input type="range" id="temperature" min="0.1" max="1" step="0.1" value="0.7">
            </div>
            
            <div class="option-group">
                <label for="max-tokens">Longueur Max (Tokens) : <span id="tokens-val">200</span></label>
                <input type="range" id="max-tokens" min="50" max="500" step="50" value="200">
            </div>
        </div>

        <button id="send-btn">Générer la réponse</button>

        <h3>Résultat :</h3>
        <div id="output" class="output-box">La réponse s'affichera ici...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
